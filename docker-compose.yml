# D1-Database — full stack definition.
#
# Phase 2: healthchecks, restart policies, reverse proxy (Caddy),
# and MinIO bucket bootstrap added. Config from `.env` (copy from `.env.example`);
# `${VAR:-default}` fallbacks keep this valid without a .env present.
name: d1-database

services:
  # The durable core (ADR-0001). pgvector image = Postgres + pgvector extension.
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-d1}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-d1_database}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [d1net]

  # Job queue for the heavy-data pipeline (Phase 4).
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Persist every 60 s if at least 1 key changed; quiet logs.
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [d1net]

  # S3-compatible object storage for 10-100 GB files (bypasses the API layer).
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_too}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [d1net]

  # Swappable adapter (ADR-0002): UI / REST / GraphQL / RBAC over OUR schema.
  # Introspects but does NOT alter structure — schema is owned by our migrations.
  directus:
    image: directus/directus:11
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KEY: ${DIRECTUS_KEY:-replace-with-random-key}
      SECRET: ${DIRECTUS_SECRET:-replace-with-random-secret}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-d1_database}
      DB_USER: ${POSTGRES_USER:-d1}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-change_me_admin}
      # Public URL used for link generation; override in .env for production.
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:80}
      # Auto-load local extensions (the actor-identity audit hook).
      EXTENSIONS_AUTO_RELOAD: "true"
    ports:
      - "${DIRECTUS_PORT:-8055}:8055"
    volumes:
      - directus-uploads:/directus/uploads
      # Mount the version-controlled hook extensions (read-only).
      - ./core/extensions:/directus/extensions:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:8055/server/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      # Directus runs its own migrations on first boot — give it time.
      start_period: 60s
    networks: [d1net]

  # Heavy-data pipeline worker (Phase 4).
  # Exposes a webhook endpoint (Directus Flow target) and an rq worker that
  # parses large .d1f files from MinIO under a fixed memory ceiling.
  heavy-data-worker:
    build:
      context: plugins/heavy-data-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_too}
      MINIO_BUCKET: ${MINIO_BUCKET:-d1-files}
      DIRECTUS_URL: http://directus:8055
      WORKER_DIRECTUS_TOKEN: ${WORKER_DIRECTUS_TOKEN:-}
      WORKER_MEMORY_LIMIT_MB: ${WORKER_MEMORY_LIMIT_MB:-256}
      WORKER_WEBHOOK_SECRET: ${WORKER_WEBHOOK_SECRET:-}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-214748364800}
      WORKER_HTTP_PORT: "8080"
    ports:
      - "${WORKER_HTTP_PORT:-8080}:8080"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [d1net]

  # FFT / frequency-analysis plugin (Phase 5).
  # Triggered by a Directus Flow when a test_session file is ready for analysis.
  # Computes amplitude spectrum, dominant frequencies, and band energy per channel.
  analysis-worker:
    build:
      context: plugins/analysis-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_too}
      MINIO_BUCKET: ${MINIO_BUCKET:-d1-files}
      DIRECTUS_URL: http://directus:8055
      WORKER_DIRECTUS_TOKEN: ${WORKER_DIRECTUS_TOKEN:-}
      WORKER_WEBHOOK_SECRET: ${WORKER_WEBHOOK_SECRET:-}
      WORKER_HTTP_PORT: "8081"
      QUEUE_NAME: analysis
      FFT_CHANNEL_INDEX: "2"
    ports:
      - "${ANALYSIS_HTTP_PORT:-8081}:8081"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [d1net]

  # Reverse proxy: single HTTP entry point → Directus admin UI.
  # MinIO console and API remain directly accessible on their own ports.
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      directus:
        condition: service_healthy
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [d1net]

volumes:
  pgdata:
  redis-data:
  minio-data:
  directus-uploads:
  caddy-data:
  caddy-config:

networks:
  d1net:
    driver: bridge
